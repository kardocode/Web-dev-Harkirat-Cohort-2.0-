<html>
    <head>
        <script>
            async function callfetch(op){
                const a = document.getElementById("first").value;
                const b = document.getElementById("second").value;

                // const res = await fetch("http://localhost:3000/"+op+"/" + a + "/" + b);
                const res = await fetch("http://localhost:2001/" + op, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body:JSON.stringify({
                        a: a,
                        b: b
                    })
                });

                const json = await res.json();
                document.getElementById("response").innerHTML = json.ans;
            
            }
        </script>
    </head>
    <body>
        <input id="first" type ="text" placeholder="first number" />
        <input id="second" type ="text" placeholder="second number" />

        <button onclick="callfetch('sum')">Add</button>
        <button onclick="callfetch('minus')">Sub</button>
        <button onclick="callfetch('mul')">Multiply</button>
        <button onclick="callfetch('div')">Divison</button>

        <div id = "response"></div>
    </body>
</html>
